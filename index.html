<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#E2580E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="description" content="Registro abierto de producción 3D para la donación médica en Venezuela. Creado por KAFETIN, con la tecnología de Fab City · Things That Work.">
<meta property="og:title" content="Makers · Venezuela — Registro de producción">
<meta property="og:description" content="Cuántas férulas se están imprimiendo y entregando. Registra lo que haces, mira el panel, aporta tu historial.">
<meta property="og:url" content="https://ttw.fab.city/venezuela">
<title>Makers · Venezuela — Things That Work</title>
<style>
:root{
  --bg:#FBF7EC;            /* TTW cream */
  --ink:#15140F;          /* near-black */
  --paper:#FFFFFF;
  --paper-warm:#FFF6EF;
  --card:#F4ECD8;
  --line:#E6DEC8;
  --orange:#E2580E;       /* TTW accent */
  --orange-dark:#b5450b;
  --blue:#0E5FA0;
  --red:#D8231F;
  --green:#6F9B12;
  --muted:#7c7665;
  --radius:14px;
  --wrap:1040px;
  --font:"Helvetica Neue",Helvetica,Arial,"Segoe UI",Roboto,system-ui,sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:17px;line-height:1.5;
  -webkit-font-smoothing:antialiased}
a{color:inherit}
.wrap{max-width:var(--wrap);margin:0 auto;padding:12px 22px}
@media(max-width:560px){.wrap{padding:12px 16px}}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--line)}
.topbar .wrap{display:flex;align-items:center;gap:14px}
.home{font-weight:900;font-size:15px;letter-spacing:.3px;text-transform:uppercase;text-decoration:none;
  display:flex;align-items:center;gap:8px;cursor:pointer}
.home .dot{width:9px;height:9px;border-radius:50%;background:var(--orange);display:inline-block}
.nav{margin-left:auto;display:flex;gap:4px;align-items:center}
.nav a{font-size:13px;font-weight:700;text-decoration:none;padding:7px 11px;border-radius:20px;
  color:var(--ink);cursor:pointer;white-space:nowrap}
.nav a.on{background:var(--orange);color:#fff}
.nav a:not(.on):hover{background:var(--card)}
.nav .ttw{color:var(--muted);font-weight:600}
@media(max-width:560px){.nav a{padding:6px 9px;font-size:12px}.home{font-size:13px}}

/* ── GENERIC ── */
.kicker{color:var(--orange);font-weight:900;text-transform:uppercase;letter-spacing:1.2px;font-size:13px}
h1{font-size:30px;font-weight:800;line-height:1.12;letter-spacing:-.4px;margin:6px 0 10px}
h2{font-size:20px;font-weight:800;letter-spacing:-.2px;margin:0 0 4px;display:flex;align-items:center;gap:9px}
h2 .tick{width:4px;height:18px;border-radius:2px;background:var(--orange);flex-shrink:0}
.lead{font-size:18px;color:#3a3730;max-width:62ch}
.muted{color:var(--muted)}
section.block{padding:22px 0;border-top:1px solid var(--line)}
section.block:first-child{border-top:0}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:8px;font-family:inherit;font-size:16px;font-weight:800;
  text-decoration:none;cursor:pointer;border:2px solid var(--ink);background:var(--ink);color:var(--bg);
  border-radius:12px;padding:13px 18px;transition:transform .08s}
.btn:active{transform:scale(.98)}
.btn.alt{background:var(--orange);border-color:var(--orange);color:#fff}
.btn.ghost{background:transparent;color:var(--ink)}
.btn.block{width:100%;justify-content:center}
.btn-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}

/* forms */
label{display:block;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;
  color:var(--muted);margin:14px 0 5px}
input,select,textarea{width:100%;font-family:inherit;font-size:16px;color:var(--ink);background:var(--paper);
  border:2px solid var(--line);border-radius:11px;padding:12px 13px;outline:none;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--orange)}
textarea{resize:vertical;min-height:56px}
.field{margin-bottom:2px}
.qrow{display:flex;gap:10px}.qrow>div{flex:1}
.qrow input{text-align:center;font-size:26px;font-weight:900}
.qlbl{font-size:10px;text-align:center;color:var(--muted);margin-top:4px;font-weight:800;text-transform:uppercase}
.consent{display:flex;gap:9px;align-items:flex-start;font-size:13px;color:var(--muted);
  margin:14px 0 4px;text-transform:none;letter-spacing:0;font-weight:500}
.consent input{width:auto;margin-top:2px;flex-shrink:0}

/* card grids */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:14px}
.mcard{background:var(--paper);border:2px solid var(--line);border-radius:var(--radius);overflow:hidden;
  cursor:pointer;text-align:left;font-family:inherit;transition:border-color .1s,transform .08s}
.mcard:active{transform:scale(.97)}
.mcard.alta{border-color:#f0c48f}
.mcard.add{border-style:dashed;border-color:var(--green);display:flex;flex-direction:column;
  align-items:center;justify-content:center;min-height:150px;gap:6px;color:var(--green);font-weight:800}
.mcard-img{height:96px;background:var(--paper-warm);display:flex;align-items:center;justify-content:center;padding:8px}
.mcard-img img{max-width:100%;max-height:100%;object-fit:contain}
.mcard-b{padding:9px 11px 12px}
.mcard-name{font-size:13px;font-weight:800;line-height:1.2;min-height:31px}
.mcard-sub{font-size:11px;color:var(--orange-dark);font-weight:700;margin-top:2px}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:14px}
.kpi{background:var(--paper);border:2px solid var(--line);border-radius:var(--radius);padding:16px 18px}
.kpi b{display:block;font-size:38px;font-weight:900;line-height:1}
.kpi.o b{color:var(--orange)}.kpi.g b{color:var(--green)}.kpi.b b{color:var(--blue)}
.kpi span{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}

/* dashboard model rows */
.drow{background:var(--paper);border:2px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:9px}
.drow-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:8px}
.drow-name{font-size:14px;font-weight:800;line-height:1.25}
.drow-sub{font-size:11px;color:var(--orange-dark);font-weight:700}
.drow-nums{display:flex;gap:14px;flex-shrink:0;text-align:right}
.drow-nums b{font-size:18px;font-weight:900;display:block;line-height:1}
.drow-nums .o{color:var(--orange)}.drow-nums .g{color:var(--green)}
.drow-nums span{font-size:8px;color:var(--muted);text-transform:uppercase;font-weight:800}
.bar{height:6px;background:var(--card);border-radius:3px;overflow:hidden;display:flex}
.bar i{height:100%;background:var(--orange)}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.chip{background:var(--paper);border:1.5px solid var(--line);border-radius:20px;padding:5px 12px;
  font-size:12px;font-weight:700}
.filters{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px;align-items:center}
.fbtn{background:var(--paper);border:1.5px solid var(--line);border-radius:20px;padding:7px 14px;
  font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.fbtn.on{background:var(--orange);border-color:var(--orange);color:#fff}
.selrow{display:flex;gap:8px;align-items:center;margin-top:10px}
.selrow select{flex:1}

/* backlog rows */
.blrow{background:var(--paper);border:2px solid var(--line);border-radius:12px;padding:13px;margin-bottom:10px;position:relative}
.blrow .rm{position:absolute;top:8px;right:10px;background:none;border:none;font-size:18px;color:var(--muted);cursor:pointer}
.blgrid{display:grid;grid-template-columns:1fr 80px 80px;gap:8px;align-items:end}
@media(max-width:480px){.blgrid{grid-template-columns:1fr 1fr}}

/* toast */
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(120%);
  background:var(--ink);color:var(--bg);padding:13px 20px;border-radius:30px;font-weight:800;font-size:14px;
  box-shadow:0 8px 30px rgba(0,0,0,.25);transition:transform .3s;z-index:100;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}

footer{border-top:1px solid var(--line);margin-top:30px}
footer .wrap{display:flex;flex-wrap:wrap;gap:8px;justify-content:space-between;font-size:13px;color:var(--muted);padding:18px 22px 34px}
footer a{color:var(--orange-dark);font-weight:700;text-decoration:none}
.spin{display:inline-block;animation:sp .8s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
.center{text-align:center;padding:40px 16px;color:var(--muted)}

/* graphic dashboard cards (model breakdown with icons) */
.dcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:14px}
.dcard{background:var(--paper);border:2px solid var(--line);border-radius:14px;overflow:hidden}
.dcard.nuevo{border-color:var(--green)}
.dcard-img{height:100px;background:var(--paper-warm);display:flex;align-items:center;justify-content:center;padding:8px;position:relative}
.dcard-img img{max-width:100%;max-height:100%;object-fit:contain}
.dcard-img .noimg{font-size:34px;color:#cfc7b3}
.dcard-badge{position:absolute;top:6px;left:6px;background:var(--green);color:#fff;font-size:7px;font-weight:900;padding:2px 6px;border-radius:10px;text-transform:uppercase;letter-spacing:.3px}
.dcard-b{padding:9px 11px 12px}
.dcard-name{font-size:12px;font-weight:800;line-height:1.2;min-height:29px}
.dcard-sub{font-size:10px;color:var(--orange-dark);font-weight:700;margin-top:1px}
.dcard-n{font-size:27px;font-weight:900;color:var(--orange);line-height:1;margin-top:7px}
.dcard-l{font-size:8px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.dcard-ent{font-size:9px;color:var(--green);font-weight:800;margin-top:3px}
.dcard-bar{height:4px;background:var(--card);border-radius:2px;margin-top:7px;overflow:hidden}
.dcard-bar i{display:block;height:100%;background:var(--orange);border-radius:2px;transition:width .5s}
</style>
</head>
<body>

<div class="topbar">
  <div class="wrap">
    <a class="home" data-route="home"><span class="dot"></span>Makers · Venezuela</a>
    <nav class="nav">
      <a data-route="registro">Registrar</a>
      <a data-route="dashboard">Panel</a>
      <a data-route="ingesta">Aportar</a>
      <a class="ttw" href="https://ttw.fab.city/venezuela" target="_blank" rel="noopener">TTW ↗</a>
    </nav>
  </div>
</div>

<main id="app" class="wrap"></main>

<footer><div class="wrap">
  <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:space-between;width:100%">
    <span>Creado por <a href="https://www.kafetin.co" target="_blank" rel="noopener"><strong>KAFETIN</strong></a> · con la tecnología de <strong>Fab City</strong></span>
    <span><a href="https://ttw.fab.city/venezuela" target="_blank" rel="noopener">ttw.fab.city/venezuela</a></span>
  </div>
  <p style="width:100%;margin-top:10px;font-size:11px;line-height:1.5;color:var(--muted)">
    Fab City es una organización sin ánimo de lucro con sede en Estonia. La gestión
    de datos de este registro sigue los estándares de la Unión Europea (RGPD/GDPR).
  </p>
</div></footer>

<div class="toast" id="toast"></div>

<link href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="models-data.js"></script>
<script>
/* ============================================================
   Makers · Venezuela — TTW-skinned app with clean-path routing
   Routes: / (home) · /registro · /dashboard · /ingesta
   ============================================================ */
const SECTIONS = ["registro","dashboard","ingesta"];
const PAISES = ["Venezuela","Colombia","Argentina","Bolivia","Chile","Costa Rica","Cuba","Ecuador","El Salvador","España","Estados Unidos","Guatemala","Honduras","México","Nicaragua","Panamá","Paraguay","Perú","República Dominicana","Uruguay","Otro"];
const C = window.CATALOG || {IDS:[],NAMES:[],SUBS:[],ALTAS:[],IMGS:{}};
const app = document.getElementById("app");

/* country centroids [lon,lat] for the map view */
const CENTROIDS = {
  "Argentina":[-64,-34],"Bolivia":[-64,-17],"Chile":[-71,-35],"Colombia":[-74,4],
  "Costa Rica":[-84,10],"Cuba":[-79,21.5],"Ecuador":[-78,-1.5],"El Salvador":[-89,13.7],
  "España":[-3.7,40],"Estados Unidos":[-98,39],"Guatemala":[-90.5,15.5],"Honduras":[-86.5,15],
  "México":[-102,23],"Nicaragua":[-85,12.8],"Panamá":[-80,8.5],"Paraguay":[-58,-23],
  "Perú":[-75,-9.5],"República Dominicana":[-70.7,19],"Uruguay":[-56,-33],"Venezuela":[-66,7]
};

/* ---- base-path-agnostic router (works on GH Pages subpaths) ---- */
let BASE = (function(){
  const segs = location.pathname.split("/");
  const last = segs[segs.length-1];
  if (SECTIONS.includes(last)) segs.pop();
  else if (last==="index.html"||last==="404.html") segs.pop();
  let b = segs.join("/"); if(!b.endsWith("/")) b+="/";
  return b;
})();
function currentRoute(){
  const segs = location.pathname.replace(/\/$/,"").split("/");
  const last = segs[segs.length-1];
  return SECTIONS.includes(last) ? last : "home";
}
function go(route){
  const url = BASE + (route==="home" ? "" : route);
  try{ history.pushState({route},"",url); }catch(e){ /* file:// */ }
  render(route);
}
window.addEventListener("popstate", ()=>render(currentRoute()));
document.addEventListener("click", e=>{
  const a = e.target.closest("[data-route]");
  if(a){ e.preventDefault(); go(a.dataset.route); }
});
function setNav(route){
  document.querySelectorAll(".nav a[data-route]").forEach(a=>
    a.classList.toggle("on", a.dataset.route===route));
}

/* ---- helpers ---- */
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const modelLabel = i => C.NAMES[i] + (C.SUBS[i] ? " - "+C.SUBS[i] : "");
const val = id => document.getElementById(id).value;
let _toastT;
function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(_toastT); _toastT=setTimeout(()=>t.classList.remove("show"),2600);
}
function hasProfile(){ const p=M4V.getProfile(); return !!(p && p.name && p.country); }

/* ============================================================
   VIEW: HOME
   ============================================================ */
function viewHome(){
  app.innerHTML = `
  <section class="block">
    <div class="kicker">Venezuela</div>
    <h1>Cada férula impresa, contada.</h1>
    <p class="lead">Un registro abierto de la producción 3D para la donación médica.
      Si estás imprimiendo desde casa o un fab lab, registra lo que haces — y míralo
      sumarse al esfuerzo de toda la red.</p>
    <div class="btn-row">
      <a class="btn alt" data-route="registro">🔧 Registrar producción</a>
      <a class="btn" data-route="dashboard">📊 Ver el panel</a>
      <a class="btn ghost" data-route="ingesta">📥 Aportar lo que ya hiciste</a>
    </div>
  </section>
  <section class="block">
    <h2><span class="tick"></span>Cómo funciona</h2>
    <p class="lead" style="margin-top:8px">Te identificas una vez (país, nombre, taller).
      Eliges el modelo, anotas cuántas fabricaste y entregaste, y listo. Sin cuenta,
      sin fricción. Los totales aparecen en el panel público al instante.</p>
  </section>
  <section class="block">
    <h2><span class="tick"></span>¿Tienes semanas de trabajo sin registrar?</h2>
    <p class="lead" style="margin-top:8px">Usa <a style="color:var(--orange-dark);font-weight:700;cursor:pointer" data-route="ingesta">Aportar</a>
      para cargar tu historial de una vez — varios modelos y fechas en una sola pasada.</p>
  </section>`;
}

/* ============================================================
   VIEW: IDENTITY (shown before registro/ingesta if no profile)
   ============================================================ */
function viewIdentity(next){
  const p = M4V.getProfile();
  app.innerHTML = `
  <section class="block">
    <div class="kicker">Identificación</div>
    <h1>¿Quién eres?</h1>
    <p class="lead">Solo una vez. Sirve para atribuir la producción y mostrar los talleres participantes.</p>
    <div style="max-width:440px">
      <label>País *</label>
      <select id="i-pais"><option value="">País…</option>
        ${PAISES.map(x=>`<option ${p.country===x?"selected":""}>${x}</option>`).join("")}</select>
      <label>Nombre completo *</label>
      <input id="i-name" value="${esc(p.name||"")}" placeholder="Tu nombre" autocomplete="name">
      <label>Empresa / emprendimiento *</label>
      <input id="i-org" value="${esc(p.org||"")}" placeholder="Taller, fab lab, marca…" autocomplete="organization">
      <label>Ciudad</label>
      <input id="i-city" value="${esc(p.city||"")}" placeholder="Opcional">
      <label>Correo / teléfono (opcional)</label>
      <input id="i-email" value="${esc(p.email||"")}" placeholder="Para coordinar entregas">
      <label class="consent"><input type="checkbox" id="i-consent">
        <span>Acepto que Fab City almacene estos datos para coordinar la donación médica.
        Fab City es una organización sin ánimo de lucro con sede en Estonia y gestiona
        los datos según los estándares de la UE (RGPD).</span></label>
      <div class="btn-row"><button class="btn alt block" id="i-go">Continuar →</button></div>
    </div>
  </section>`;
  document.getElementById("i-go").onclick = async ()=>{
    const pais=val("i-pais"), name=val("i-name").trim(), org=val("i-org").trim();
    if(!pais||!name||!org){ toast("Completa país, nombre y empresa."); return; }
    if(!document.getElementById("i-consent").checked){ toast("Acepta el almacenamiento para continuar."); return; }
    await M4V.saveProfile({name,org,country:pais,city:val("i-city").trim(),email:val("i-email").trim()});
    render(next);
  };
}

/* ============================================================
   VIEW: REGISTRO (mobile register)
   ============================================================ */
let _pick = null; // catalog index or "custom"
function viewRegistro(){
  if(!hasProfile()) return viewIdentity("registro");
  const p = M4V.getProfile();
  const cards = C.IDS.map((id,i)=>`
    <button class="mcard ${C.ALTAS[i]?"alta":""}" data-i="${i}">
      <div class="mcard-img">${C.IMGS[id]?`<img src="${C.IMGS[id]}" alt="">`:"🦴"}</div>
      <div class="mcard-b"><div class="mcard-name">${esc(C.NAMES[i])}</div>
        ${C.SUBS[i]?`<div class="mcard-sub">${esc(C.SUBS[i])}</div>`:""}</div>
    </button>`).join("");
  app.innerHTML = `
  <section class="block">
    <div class="kicker">Registrar · ${esc(p.org)}</div>
    <h1>¿Qué imprimiste?</h1>
    <p class="lead">Toca un modelo para registrar unidades fabricadas y entregadas.</p>
    <div class="btn-row"><button class="btn ghost" onclick="downloadAll()" style="font-size:13px;padding:9px 14px">⬇ Descargar reporte</button></div>
    <div class="grid">
      ${cards}
      <button class="mcard add" id="reg-custom"><div style="font-size:30px">＋</div>Otro modelo</button>
    </div>
  </section>
  <div id="reg-form"></div>`;
  app.querySelectorAll(".mcard[data-i]").forEach(b=>
    b.onclick=()=>openRegForm(parseInt(b.dataset.i)));
  document.getElementById("reg-custom").onclick=()=>openRegForm("custom");
}
function openRegForm(i){
  _pick=i;
  const custom = i==="custom";
  const today = new Date().toISOString().slice(0,10);
  const head = custom ? `Otro modelo` : C.NAMES[i]+(C.SUBS[i]?` · ${C.SUBS[i]}`:"");
  document.getElementById("reg-form").innerHTML = `
  <section class="block" style="border-top:2px solid var(--orange)">
    <h2><span class="tick"></span>${esc(head)}</h2>
    <div style="max-width:440px">
      ${custom?`<label>Nombre del modelo *</label><input id="r-name" placeholder="Ej: Férula muñeca V2">
        <label>Variante / descripción</label><input id="r-desc" placeholder="Ej: Derecho, adulto…">`:""}
      <label>Unidades</label>
      <div class="qrow">
        <div><input id="r-fab" type="number" min="0" value="0" inputmode="numeric"><div class="qlbl">🔧 Fabricadas</div></div>
        <div><input id="r-ent" type="number" min="0" value="0" inputmode="numeric"><div class="qlbl">📦 Entregadas</div></div>
      </div>
      <label>Fecha</label><input id="r-fecha" type="date" value="${today}">
      <label>Foto (opcional)</label><input id="r-photo" type="file" accept="image/*" capture="environment">
      <label>Notas (opcional)</label><textarea id="r-notas" placeholder="Talla, destino, observaciones…"></textarea>
      <div class="btn-row">
        <button class="btn alt" id="r-go">✅ Registrar</button>

async function sendBacklog(){
  const rows=[...document.querySelectorAll(".blrow")];
  let entries=[];
  for(const r of rows){
    const mv=r.querySelector(".bl-model").value;
    const fab=+r.querySelector(".bl-fab").value||0, ent=+r.querySelector(".bl-ent").value||0;
    if(mv===""||(fab===0&&ent===0)) continue;
    let e={fabricadas:fab,entregadas:ent,fecha:r.querySelector(".bl-fecha").value,
      notas:r.querySelector(".bl-notas").value.trim(),status:ent>0?"delivered":"printed",source:"manual"};
    if(mv==="custom"){ const nm=(r.querySelector(".bl-cname")?.value||"").trim();
      if(!nm){ toast("Falta el nombre de un modelo personalizado."); return; }
      e.modelId=null; e.modelLabel="NUEVO: "+nm;
    } else { e.modelId=C.IDS[+mv]; e.modelLabel=modelLabel(+mv); }
    entries.push(e);
  }
  if(!entries.length){ toast("Nada que enviar todavía."); return; }
  const btn=document.getElementById("bl-send"); btn.disabled=true; btn.textContent="⏳ Enviando…";
  let ok=0; for(const e of entries){ try{ await M4V.registerProduction(e); ok++; }catch(err){} }
  document.getElementById("bl-count").textContent=`${ok} de ${entries.length} lotes guardados.`;
  toast(`✅ ${ok} lotes guardados`);
  btn.disabled=false; btn.textContent="📤 Enviar todo";
  if(ok===entries.length){ setTimeout(()=>go("dashboard"),900); }
}

/* ---- PDF report (branded), used by every view ---- */
function pdfReport(rows, scope, fileName){
  if(!rows||!rows.length){ toast("No hay datos para exportar."); return; }
  if(!(window.jspdf&&window.jspdf.jsPDF)){ toast("No se pudo cargar el generador PDF."); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:"pt",format:"a4"});
  const W = doc.internal.pageSize.getWidth();
  // aggregates
  let fab=0,ent=0; const models=new Set(),orgs=new Set(),countries=new Set();
  rows.forEach(r=>{ fab+=r.fab; ent+=r.ent; if(r.tipo)models.add(r.tipo); if(r.empresa)orgs.add(r.empresa); if(r.pais)countries.add(r.pais); });
  // header bar
  doc.setFillColor(226,88,14); doc.rect(0,0,W,64,"F");
  doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(16);
  doc.text("Makers · Venezuela", 40, 30);
  doc.setFont("helvetica","normal"); doc.setFontSize(10);
  doc.text("Registro de producción 3D para la donación médica", 40, 46);
  // meta
  doc.setTextColor(21,20,15); doc.setFontSize(10);
  const today=new Date().toLocaleString("es");
  doc.text(`Reporte: ${scope}`, 40, 88);
  doc.text(`Generado: ${today}`, 40, 102);
  doc.setFont("helvetica","bold"); doc.setFontSize(11);
  doc.text(`Fabricadas: ${fab}   Entregadas: ${ent}   Modelos: ${models.size}   Talleres: ${orgs.size}   Países: ${countries.size}`, 40, 124);
  // table
  doc.autoTable({
    startY: 140,
    head: [["Fecha","Taller","Modelo","Fab.","Ent.","País"]],
    body: rows.map(r=>[r.fecha||"", r.empresa||"", (r.tipo||"").replace(/^NUEVO:\s*/i,"★ "), r.fab, r.ent, r.pais||""]),
    styles:{font:"helvetica",fontSize:8,cellPadding:3,textColor:[21,20,15]},
    headStyles:{fillColor:[21,20,15],textColor:[255,255,255]},
    alternateRowStyles:{fillColor:[247,243,236]},
    columnStyles:{3:{halign:"right"},4:{halign:"right"}},
    margin:{left:40,right:40},
    didDrawPage:()=>{
      const h=doc.internal.pageSize.getHeight();
      doc.setFontSize(8); doc.setTextColor(124,118,101);
      doc.text("Creado por KAFETIN · con la tecnología de Fab City — ttw.fab.city/venezuela", 40, h-20);
    }
  });
  doc.save((fileName||"makers-venezuela.pdf").replace(/\s+/g,"-"));
  toast(`⬇ Reporte PDF (${rows.length} registros)`);
}

/* country points for either map renderer */
function countryPoints(byCountry){
  return Object.entries(byCountry).map(([c,v])=>{
    const co=CENTROIDS[c]; return co?{c,fab:v.fab,ent:v.ent,lon:co[0],lat:co[1]}:null;
  }).filter(Boolean);
}
/* Real-world choropleth via Leaflet + CARTO basemap (no token). SVG fallback if Leaflet/GeoJSON unavailable. */
function mapSection(byCountry){
  const pts=countryPoints(byCountry);
  if(!pts.length) return "";
  if(window.L){
    setTimeout(()=>initLeaflet(byCountry),30);
    return `<section class="block"><h2><span class="tick"></span>Producción por país</h2>
      <div id="leaflet-map" style="height:420px;border:2px solid var(--line);border-radius:14px;overflow:hidden;background:var(--paper-warm)"></div>
      <p class="muted" style="font-size:11px;margin-top:6px">Color = unidades fabricadas. Toca un país para filtrar.</p></section>`;
  }
  return buildCountryMap(byCountry);
}
/* Spanish country name -> ISO 3166-1 alpha-3 (matches the world GeoJSON feature ids) */
const ISO3={"Colombia":"COL","Venezuela":"VEN","Estados Unidos":"USA","Panamá":"PAN","Argentina":"ARG",
  "México":"MEX","Uruguay":"URY","España":"ESP","El Salvador":"SLV","Chile":"CHL","Bolivia":"BOL",
  "Ecuador":"ECU","Perú":"PER","Costa Rica":"CRI","Cuba":"CUB","Guatemala":"GTM","Honduras":"HND",
  "Nicaragua":"NIC","Paraguay":"PRY","República Dominicana":"DOM"};
function orangeScale(t){ // t 0..1 -> light to deep orange
  const a=[250,224,200], b=[166,60,8];
  const c=a.map((v,i)=>Math.round(v+(b[i]-v)*t));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}
let _lmap=null, _geo=null, _lastByCountry={};
async function initLeaflet(byCountry){
  const el=document.getElementById("leaflet-map"); if(!el||!window.L) return;
  try{
    if(_lmap){ _lmap.remove(); _lmap=null; }
    const map=L.map(el,{scrollWheelZoom:false,attributionControl:true,minZoom:1}).setView([10,-55],2);
    _lmap=map;
    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
      {subdomains:"abcd",maxZoom:8,attribution:"© OpenStreetMap, © CARTO"}).addTo(map);
    const byIso={}; let maxFab=1;
    Object.entries(byCountry).forEach(([c,v])=>{ const iso=ISO3[c]; if(iso){ byIso[iso]={c,fab:v.fab,ent:v.ent}; maxFab=Math.max(maxFab,v.fab); }});
    if(!_geo){ _geo=await fetch("https://cdn.jsdelivr.net/gh/johan/world.geo.json@master/countries.geo.json").then(r=>r.json()); }
    const layer=L.geoJSON(_geo,{
      style:f=>{ const d=byIso[f.id]; const t=d?Math.pow(d.fab/maxFab,0.45):0;
        return {weight:0.5,color:"#E6DEC8",fillColor:d?orangeScale(t):"#efece3",fillOpacity:d?0.92:0.25}; },
      onEachFeature:(f,lyr)=>{ const d=byIso[f.id]; if(d){
        lyr.bindTooltip(`<b>${d.c}</b><br>${d.fab} fab · ${d.ent} ent`,{sticky:true});
        lyr.on("click",()=>setPaisFromMap(d.c));
        lyr.on("mouseover",()=>lyr.setStyle({weight:1.6,color:"#E2580E"}));
        lyr.on("mouseout",()=>lyr.setStyle({weight:0.5,color:"#E6DEC8"}));
      }}
    }).addTo(map);
    const withData=L.geoJSON(_geo,{filter:f=>byIso[f.id]});
    try{ const b=withData.getBounds(); if(b.isValid()) map.fitBounds(b,{padding:[28,28],maxZoom:5}); }catch(e){}
    const lg=L.control({position:"bottomleft"});
    lg.onAdd=()=>{ const div=L.DomUtil.create("div");
      div.style.cssText="background:var(--paper);border:1.5px solid var(--line);border-radius:8px;padding:7px 10px;font:700 10px var(--font);color:var(--ink)";
      div.innerHTML=`<div style="margin-bottom:4px">Unidades fabricadas</div>
        <div style="height:8px;width:140px;border-radius:4px;background:linear-gradient(90deg,${orangeScale(0.05)},${orangeScale(1)})"></div>
        <div style="display:flex;justify-content:space-between;color:var(--muted);margin-top:2px"><span>menos</span><span>${maxFab}</span></div>`;
      return div; };
    lg.addTo(map);
    setTimeout(()=>map.invalidateSize(),200);
  }catch(e){ console.warn("leaflet:",e.message); el.outerHTML=buildCountryMap(_lastByCountry||byCountry||{}); }
}
/* proportional-symbol map of fabricated units per country (SVG fallback) */
function buildCountryMap(byCountry){
  const pts=Object.entries(byCountry).map(([c,v])=>{
    const co=CENTROIDS[c]; return co?{c,fab:v.fab,ent:v.ent,lon:co[0],lat:co[1]}:null;
  }).filter(Boolean);
  if(!pts.length) return "";
  const xs=pts.map(p=>p.lon), ys=pts.map(p=>-p.lat);
  let minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const padX=Math.max(10,(maxX-minX)*0.3)+8, padY=Math.max(10,(maxY-minY)*0.3)+8;
  minX-=padX;maxX+=padX;minY-=padY;maxY+=padY;
  const w=maxX-minX,h=maxY-minY, maxFab=Math.max(...pts.map(p=>p.fab));
  const rOf=f=>1.4+Math.sqrt(f/maxFab)*Math.min(w,h)*0.14;
  const fs=Math.max(1.4,Math.min(w,h)*0.028);
  const circles=pts.sort((a,b)=>b.fab-a.fab).map(p=>{
    const x=p.lon,y=-p.lat,r=rOf(p.fab);
    return `<g style="cursor:pointer" onclick="setPaisFromMap('${p.c.replace(/'/g,"")}')">
      <circle cx="${x}" cy="${y}" r="${r}" fill="var(--orange)" fill-opacity="0.5" stroke="var(--orange)" stroke-width="0.4"/>
      <text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="central" font-size="${Math.max(fs,r*0.55)}" font-weight="900" fill="#fff">${p.fab}</text>
      <text x="${x}" y="${(y+r+fs*1.25).toFixed(1)}" text-anchor="middle" font-size="${fs}" font-weight="700" fill="var(--ink)">${esc(p.c)}</text>
    </g>`;
  }).join("");
  return `<section class="block"><h2><span class="tick"></span>Producción por país</h2>
    <div style="background:var(--paper-warm);border:2px solid var(--line);border-radius:14px;padding:10px">
      <svg viewBox="${minX.toFixed(1)} ${minY.toFixed(1)} ${w.toFixed(1)} ${h.toFixed(1)}"
        style="width:100%;height:auto;display:block;max-height:60vh" preserveAspectRatio="xMidYMid meet">${circles}</svg>
    </div>
    <p class="muted" style="font-size:11px;margin-top:6px">Tamaño = unidades fabricadas. Toca un país para filtrar. Solo se muestran países con ubicación registrada.</p>
  </section>`;
}
function setPaisFromMap(c){ _fPais=c; const s=document.getElementById("dash-pais"); if(s) s.value=c; renderDash(); }
function inRange(d){
  if(_fFilter==="all"||!d) return _fFilter==="all";
  const now=new Date(), x=new Date(d);
  if(_fFilter==="today") return d===now.toISOString().slice(0,10);
  if(_fFilter==="week") return x>=new Date(now-7*864e5);
  if(_fFilter==="month") return x>=new Date(now.getFullYear(),now.getMonth(),1);
  return true;
}
function renderDash(){
  const body=document.getElementById("dash-body"); if(!body||!_rows) return;
  const rows=_rows
    .filter(r=>_fFilter==="all"?true:inRange((r.fecha||"").slice(0,10)))
    .filter(r=>!_fPais||r.pais===_fPais)
    .filter(r=>!_fModel||r.tipo===_fModel);
  _filtered=rows;
  if(!rows.length){ body.innerHTML=`<div class="center">Sin datos para este filtro todavía.</div>`; return; }
  const byModel={}, byCountry={}, orgs=new Set(); let fab=0,ent=0;
  rows.forEach(r=>{ fab+=r.fab; ent+=r.ent; if(r.empresa)orgs.add(r.empresa);
    const k=r.tipo||"—"; (byModel[k]=byModel[k]||{fab:0,ent:0}); byModel[k].fab+=r.fab; byModel[k].ent+=r.ent;
    const c=r.pais||""; if(c){ (byCountry[c]=byCountry[c]||{fab:0,ent:0}); byCountry[c].fab+=r.fab; byCountry[c].ent+=r.ent; } });
  const sorted=Object.entries(byModel).sort((a,b)=>b[1].fab-a[1].fab);
  const max=Math.max(1,...sorted.map(([,v])=>v.fab));
  // image lookup by "Nombre - Variante" or "Nombre"
  const imgMap={}; C.IDS.forEach((id,i)=>{ imgMap[modelLabel(i)]=C.IMGS[id]; imgMap[C.NAMES[i]]=imgMap[C.NAMES[i]]||C.IMGS[id]; });
  const modelRows=sorted.map(([t,v])=>{
    const isNew=/^NUEVO:/i.test(t); const label=t.replace(/^NUEVO:\s*/i,"");
    const [nm,sub]=label.split(" - ");
    const img=imgMap[label]||imgMap[nm]||"";
    const pct=Math.round(v.fab/max*100);
    return `<div class="dcard${isNew?" nuevo":""}">
      <div class="dcard-img">${isNew?'<div class="dcard-badge">✨ nuevo</div>':""}
        ${img?`<img src="${img}" alt="" loading="lazy">`:'<div class="noimg">🦴</div>'}</div>
      <div class="dcard-b">
        <div class="dcard-name">${esc(nm)}</div>
        ${sub?`<div class="dcard-sub">${esc(sub)}</div>`:""}
        <div class="dcard-n">${v.fab}</div><div class="dcard-l">unidades fabricadas</div>
        ${v.ent?`<div class="dcard-ent">📦 ${v.ent} entregadas</div>`:""}
        <div class="dcard-bar"><i style="width:${pct}%"></i></div>
      </div></div>`;
  }).join("");
  body.innerHTML=`
    <section class="block" style="border-top:0;padding-top:6px">
      <div class="kpis">
        <div class="kpi o"><b>${fab.toLocaleString("es")}</b><span>🔧 Fabricadas</span></div>
        <div class="kpi g"><b>${ent.toLocaleString("es")}</b><span>📦 Entregadas</span></div>
        <div class="kpi b"><b>${sorted.length}</b><span>🦴 Modelos</span></div>
        <div class="kpi"><b>${orgs.size}</b><span>🏭 Talleres</span></div>
      </div>
    </section>
    ${(_lastByCountry=byCountry, mapSection(byCountry))}
    <section class="block"><h2><span class="tick"></span>Producción por modelo</h2>
      <div class="dcards">${modelRows}</div></section>
    <section class="block"><h2><span class="tick"></span>Talleres participantes (${orgs.size})</h2>
      <div class="chips">${[...orgs].sort().map(o=>`<div class="chip">${esc(o)}</div>`).join("")}</div></section>`;
}
